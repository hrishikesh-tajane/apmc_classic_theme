{% extends "/templates/layout.html" %}

{% block content %}


<div class="container">

    <div class="row my-5">

        <div class="my-3">
            <a href="/news" class="btn btn-secondary">
                <i class="fa fa-arrow-left"></i>
                <b>मागे</b>
            </a>
        </div>

        <div id="news-detail" class="row">

            <div class="text-center">
                Loading...
            </div>

        </div>

    </div>

</div>


<script>
    document.addEventListener("DOMContentLoaded", async () => {

        const params = new URLSearchParams(window.location.search);

        const route = params.get("route");

        if (!route) {
            document.getElementById("news-detail").innerHTML =
                "<h3>बातमी सापडली नाही.</h3>";
            return;
        }

        try {

            const response = await fetch(
                `/api/method/apmc_classic_theme.api.news.get_news_detail?route=${route}`
            );

            const data = await response.json();

            const news = data.message;

            if (!news) {
                document.getElementById("news-detail").innerHTML =
                    "<h3>बातमी सापडली नाही.</h3>";
                return;
            }

            document.getElementById("news-detail").innerHTML = `

            <div class="col-md-5">
                <img
                    class="news_img"
                    src="${news.meta_image || ''}"
                    height="300"
                    width="100%"
                    alt="${news.title}"
                >
            </div>

            <div class="col-md-7">

                <span class="bg-success w-auto p-1 px-2 text-light rounded-5">
                    ${news.blog_category || ''}
                </span>

                <h5 class="my-4">
                    <b>${news.title}</b>
                </h5>

                <div class="d-flex">

                    <span class="text-dark d-flex align-items-center">
                        <i class="fa fa-circle mx-2"
                           style="font-size:6px;"></i>
                        ${news.time_ago}
                    </span>

                    <span class="text-secondary d-flex align-items-center mx-3">
                        <i class="fa fa-circle mx-2"
                           style="font-size:6px;"></i>
                        <i>${news.blogger || ''}</i>
                    </span>

                </div>

                <div class="news_info mt-3">
                    ${news.content || ''}
                </div>

            </div>
        `;

        } catch (error) {

            console.error(error);

            document.getElementById("news-detail").innerHTML =
                "<h3>डेटा लोड झाला नाही.</h3>";
        }

    });
</script>

{% endblock %}
